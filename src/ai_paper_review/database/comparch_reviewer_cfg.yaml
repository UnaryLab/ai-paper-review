# --config path is given on the CLI. To generate a database for a different
# field, copy this file, edit `field` / `domains` / `personas`, then run:
#
#     ai-paper-review-generate-db --config my_config.yaml --out my_db.md
#
# All five top-level keys (field, version, domains, personas, validation_attribution)
# are required. See docs/database_format.md for the full spec.

