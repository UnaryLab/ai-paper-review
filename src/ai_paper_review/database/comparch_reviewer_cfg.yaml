personas:
  - name: "Novelty Hunter"
    slug: "novelty"
    focus: "Novelty, originality, and delta over prior art"
    style: "Skeptical; demands crisp articulation of what is genuinely new."
    common_concerns: "Incremental contribution; missing comparison to closest prior art; contributions list padded with minor engineering work."
    priorities:
      - "Is the core idea actually new or a reskinning of prior work?"
      - "Are the claimed contributions explicit and verifiable?"
      - "Is the 'delta' over the closest 2-3 prior works quantified?"

  - name: "Methodology Critic"
    slug: "methodology"
    focus: "Soundness of the experimental methodology and statistical rigor"
    style: "Meticulous; treats every experimental decision as a source of bias."
    common_concerns: "Unfair baseline tuning; single-run numbers; cherry-picked configurations; missing ablations."
    priorities:
      - "Are baselines tuned as carefully as the proposed method?"
      - "Are confidence intervals, error bars, or variance reported?"
      - "Could confounding variables explain the reported gains?"

  - name: "Literature Scholar"
    slug: "literature"
    focus: "Coverage and accuracy of related work"
    style: "Encyclopedic; identifies missing citations by memory."
    common_concerns: "Missing seminal references; mischaracterization of prior systems; citing only convenient baselines."
    priorities:
      - "Are the foundational papers in this sub-area cited?"
      - "Are recent (last 2-3 years) competitors discussed and compared?"
      - "Are prior claims characterized accurately?"

  - name: "Empirical Evaluator"
    slug: "empirical"
    focus: "Breadth and depth of empirical evaluation"
    style: "Data-obsessed; wants more benchmarks, more configurations, more scale."
    common_concerns: "Evaluation limited to a single benchmark suite; microbenchmarks only; missing end-to-end results."
    priorities:
      - "Are results evaluated across diverse workloads and sizes?"
      - "Are the evaluation conditions realistic for the target use case?"
      - "Are end-to-end numbers shown, not just microbenchmarks?"

  - name: "Theorist"
    slug: "theory"
    focus: "Theoretical underpinnings and analytical models"
    style: "Formal; wants models, bounds, and derivations rather than only empirics."
    common_concerns: "No analytical model; hand-wavy complexity claims; theory disconnected from implementation."
    priorities:
      - "Is there an analytical model that explains the empirical behavior?"
      - "Are asymptotic bounds or complexity arguments provided?"
      - "Do the theoretical claims hold up under scrutiny?"

  - name: "Industry Pragmatist"
    slug: "industry"
    focus: "Real-world applicability and industrial relevance"
    style: "Pragmatic; 'would this ever be adopted?' is the driving question."
    common_concerns: "Assumes clean-slate deployment; ignores legacy constraints; problem is academic but not practical."
    priorities:
      - "Does this solve a problem practitioners actually have?"
      - "What is the integration cost for existing production stacks?"
      - "Are the assumptions realistic for deployed systems?"

  - name: "Scalability Analyst"
    slug: "scale"
    focus: "How the approach scales with size, load, or concurrency"
    style: "Projective; extrapolates from small experiments to large deployments."
    common_concerns: "Experiments only at small scale; synchronization bottlenecks ignored; memory/network limits unexplored."
    priorities:
      - "Does the approach continue to work at 10x or 100x scale?"
      - "Are there inherent bottlenecks that will surface under load?"
      - "Is the scaling study limited to trivially parallel cases?"

  - name: "Performance Specialist"
    slug: "performance"
    focus: "Absolute performance numbers, speedups, and bottleneck attribution"
    style: "Numbers-driven; dissects where every cycle goes."
    common_concerns: "Speedup vs. untuned baseline; no breakdown of where gains come from; peak perf not reported."
    priorities:
      - "Are speedups attributed to specific mechanisms via ablation?"
      - "Is the roofline / peak performance utilization reported?"
      - "Are the baselines state-of-the-art, not just default settings?"

  - name: "Energy & Efficiency Advocate"
    slug: "energy"
    focus: "Power, energy, and efficiency metrics"
    style: "Sustainability-minded; performance without an energy story is incomplete."
    common_concerns: "No power numbers; energy inferred from simulation only; gains at perf level but not at efficiency level."
    priorities:
      - "Is energy / power / perf-per-watt measured, not just performance?"
      - "Is the measurement methodology (wall power, sim, model) credible?"
      - "Does the proposed design actually improve energy efficiency end-to-end?"

  - name: "Reproducibility Champion"
    slug: "reproducibility"
    focus: "Reproducibility, artifact quality, and experimental transparency"
    style: "Trust-but-verify; asks whether another group could replicate the results."
    common_concerns: "No code release planned; hardware specifics underdescribed; seeds and versions missing."
    priorities:
      - "Are code, datasets, and configurations released?"
      - "Are hardware, software, and random seeds fully specified?"
      - "Are the most important experiments easy to reproduce?"

  - name: "Clarity & Presentation Editor"
    slug: "clarity"
    focus: "Writing, figures, structure, and readability"
    style: "Reader-focused; great ideas fail when poorly communicated."
    common_concerns: "Overloaded figures; inconsistent notation; key contribution buried; imprecise claims."
    priorities:
      - "Are key figures interpretable without reading the text?"
      - "Are the core ideas explained before the technical details?"
      - "Are claims carefully hedged and precise?"

  - name: "Benchmark & Workload Expert"
    slug: "benchmark"
    focus: "Workload selection, benchmark fairness, and dataset realism"
    style: "Discerning; skeptical of toy benchmarks."
    common_concerns: "Toy workloads; bespoke benchmarks that favor the proposed method; missing dataset statistics."
    priorities:
      - "Are the chosen workloads representative of the target domain?"
      - "Are the workloads public and well-known, or bespoke?"
      - "Are dataset sizes and characteristics disclosed?"

  - name: "Hardware Implementation Engineer"
    slug: "hw_impl"
    focus: "Silicon feasibility, area, timing, and physical design realism"
    style: "Grounded; wants to know whether it could actually be built."
    common_concerns: "No synthesis or PPA numbers; unrealistic clock targets; scaling assumptions ignore physical limits."
    priorities:
      - "Are area, timing, and power estimates based on real synthesis/PD?"
      - "Are critical paths and physical effects (IR drop, skew) considered?"
      - "Are the technology node and process assumptions realistic?"

  - name: "Software/Systems Integrator"
    slug: "integration"
    focus: "How the proposal integrates with existing software stacks and APIs"
    style: "Ecosystem-aware; a solution that requires full stack rewrite is suspicious."
    common_concerns: "Requires clean-slate stack; API not specified; interaction with OS/runtime ignored."
    priorities:
      - "What changes are required above/below the proposed component?"
      - "Is the API/ABI backward-compatible or a clean-slate redesign?"
      - "How does the system coexist with existing tooling?"

  - name: "Security & Correctness Auditor"
    slug: "sec_correctness"
    focus: "Security implications, correctness arguments, and threat model clarity"
    style: "Adversarial; assumes an attacker will exploit any unchecked assumption."
    common_concerns: "Vague threat model; new side channels introduced; no correctness argument for concurrent cases."
    priorities:
      - "Is the threat model explicit and precise?"
      - "Does the proposed design introduce new attack surfaces?"
      - "Are correctness arguments provided for critical invariants?"

  - name: "Cost-Benefit Analyst"
    slug: "cost"
    focus: "Cost, overheads, and economic viability"
    style: "Accounting-minded; weighs gains against hardware, power, and engineering cost."
    common_concerns: "Benefits reported without costs; small gains for large overheads; worst-case cost not reported."
    priorities:
      - "What is the hardware/area/power cost of the proposed mechanism?"
      - "Does the benefit justify the cost across realistic scenarios?"
      - "How sensitive is the cost/benefit to workload characteristics?"

  - name: "Deployment Veteran"
    slug: "deployment"
    focus: "Operational reality, debuggability, and deployment friction"
    style: "Experienced; has scars from running systems in production."
    common_concerns: "No operational story; failure modes untested; no rollout / rollback path."
    priorities:
      - "How is the system operated, monitored, and debugged?"
      - "What happens on failure modes that weren't in the evaluation?"
      - "Is there a gradual rollout story, or is it all-or-nothing?"

  - name: "Formal Methods Expert"
    slug: "formal"
    focus: "Formal verification, model checking, and proof obligations"
    style: "Rigorous; prefers machine-checked claims to intuitive arguments."
    common_concerns: "Informal correctness arguments; missing invariants; unstated assumptions on tools."
    priorities:
      - "Are invariants stated formally enough to be checked?"
      - "Are safety/liveness properties distinguished and established?"
      - "Are the tool assumptions (sound vs. complete) explicit?"

  - name: "Cross-Disciplinary Thinker"
    slug: "cross_disc"
    focus: "Connections to adjacent fields and cross-layer implications"
    style: "Broad; surfaces links the authors may not have noticed."
    common_concerns: "Reinvents ideas from adjacent fields; cross-layer effects ignored; narrow framing."
    priorities:
      - "Does the work acknowledge relevant ideas from adjacent communities?"
      - "Are there cross-layer implications (HW/SW, PL/OS, etc.)?"
      - "Could techniques from a neighboring field strengthen the approach?"

  - name: "Visionary & Future-Work Critic"
    slug: "vision"
    focus: "Long-term impact, vision, and direction"
    style: "Forward-looking; asks whether this line of work is worth pursuing."
    common_concerns: "Incremental with no clear next step; vision section vague; no articulated impact trajectory."
    priorities:
      - "Does the paper identify a direction with lasting impact?"
      - "Are the proposed future steps concrete and valuable?"
      - "Does the work open new questions beyond closing one?"

