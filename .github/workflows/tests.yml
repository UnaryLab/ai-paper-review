name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project with dev extras
        # [dev] adds pytest + pyflakes + build. The core deps already
        # include every LLM SDK, so the default install covers all
        # provider code paths.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint with pyflakes
        run: pyflakes src/ tests/

      - name: Run tests
        # -q keeps logs readable on the Actions UI; --strict-markers is
        # already set via pyproject's [tool.pytest.ini_options].
        run: pytest -q
